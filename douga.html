<!DOCTYPE html>
<html>
  <body>
    <div class="yt-guard">
    	<video id="player" src="sample.mp4"
        playsinline 
        webkit-playinline
        disablePictureInPicture></video>
    </div>
    <div id="playbtn" onclick="play()">
    再生
    </div>
    <script>
    function play(){
    	var video = document.getElementById("player");
    	if(video.paused){
    		video.play();
    	}else{
    		video.pause();
    	}
    }
    </script>
    <style>
      player {
        width: 100%;
    </style>
  </body>
</html>
